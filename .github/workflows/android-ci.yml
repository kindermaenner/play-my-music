name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests + Coverage (core)
        run: ./gradlew :core:testDebugUnitTest :core:jacocoTestReport --no-daemon

      - name: Upload Test Reports (core)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-unit-test-reports
          path: core/build/reports/tests/testDebugUnitTest/
          retention-days: 5

      - name: Upload Coverage to Codecov (core)
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: core/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
