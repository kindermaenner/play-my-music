name: UI Flow Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  ui-flow-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run instrumented flow tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest --console=plain | tee ui-test-full.log

      - name: Extract UI state log
        run: |
          grep "STATE_REACHED:" ui-test-full.log > ui-test-log.txt || true
          cat ui-test-log.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Calculate UI flow coverage
        run: python calculate_ui_coverage.py

      - name: Upload UI flow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-flow-coverage
          path: |
            ui-test-full.log
            ui-test-log.txt
            ui-flow-coverage.json
            app/build/reports/androidTests/connected/

      - name: Upload UI flow coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ui-flow-coverage.json
          flags: ui-flows
          name: ui-flow-coverage
          token: ${{ secrets.CODECOV_TOKEN }}