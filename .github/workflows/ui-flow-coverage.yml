name: UI Flow Coverage

on:
    push:
        branches: [ "main", "develop" ]
    pull_request:
        branches: [ "main", "develop" ]

permissions:
    contents: read

jobs:
    ui-flow-coverage:
        runs-on: ubuntu-latest
        timeout-minutes: 40

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "17"
            cache: gradle

        - name: Install Android SDK manually
          run: |
            export ANDROID_HOME=$HOME/android-sdk
            mkdir -p $ANDROID_HOME/cmdline-tools
            cd $ANDROID_HOME/cmdline-tools

            curl -s https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
            unzip -q tools.zip
            rm tools.zip
            mv cmdline-tools latest

            # 👉 WICHTIG: sofort verfügbar machen
            export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

            # 👉 optional für spätere Steps
            echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
            echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

            yes | sdkmanager --licenses > /dev/null

            sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64"

        - name: Make gradlew executable
          run: chmod +x ./gradlew

        - name: Enable KVM
          run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

        - name: Run instrumented tests
          uses: ReactiveCircus/android-emulator-runner@v2
          with:
            api-level: 34
            target: google_apis
            arch: x86_64
            profile: pixel_6
            emulator-options: 
              -no-window
              -gpu swiftshader_indirect
              -noaudio
              -no-boot-anim
              -no-snapshot
              -accel on
            disable-animations: true
            script: |
              set -o pipefail
              adb wait-for-device
              ./gradlew connectedDebugAndroidTest --console=plain | tee ui-test-full.log
      
        - name: Extract UI state log
          run: |
            grep "STATE_REACHED:" ui-test-full.log > ui-test-log.txt || true
            echo "---- Extracted states ----"
            cat ui-test-log.txt || true

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Calculate UI flow coverage
          run: python calculate_ui_coverage.py

        - name: Upload UI flow artifacts
          uses: actions/upload-artifact@v4
          with:
            name: ui-flow-coverage
            path: |
                ui-test-full.log
                ui-test-log.txt
                ui-flow-coverage.json
                app/build/reports/androidTests/connected/

        - name: Upload UI flow coverage to Codecov
          uses: codecov/codecov-action@v4
          with:
            files: ui-flow-coverage.json
            flags: ui-flows
            name: ui-flow-coverage
            token: ${{ secrets.CODECOV_TOKEN }}