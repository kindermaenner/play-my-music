name: UI Flow Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  ui-flow-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # ⚡ Cache Android SDK (macht Builds viel schneller)
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}-api-34

      # 🔥 KVM aktivieren (sonst Emulator instabil)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🚀 Emulator + Tests (SDK wird hier automatisch gemanagt)
      - name: Run instrumented flow tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 300
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
            -accel on
          disable-animations: true
          script: |
            set -o pipefail

            adb wait-for-device

            echo "⏳ Waiting for emulator to fully boot..."
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'

            echo "🔓 Unlock screen"
            adb shell input keyevent 82

            echo "⚡ Disable animations"
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            ./gradlew connectedDebugAndroidTest --console=plain | tee ui-test-full.log

      # 📊 Logs extrahieren
      - name: Extract UI state log
        run: |
          grep "STATE_REACHED:" ui-test-full.log > ui-test-log.txt || true
          echo "---- Extracted states ----"
          cat ui-test-log.txt || true

      # 🐍 Python für Coverage
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Calculate UI flow coverage
        run: python calculate_ui_coverage.py

      # 📦 Artefakte hochladen
      - name: Upload UI flow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-flow-coverage
          path: |
            ui-test-full.log
            ui-test-log.txt
            ui-flow-coverage.json
            app/build/reports/androidTests/connected/

      # 📈 Codecov Upload
      - name: Upload UI flow coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ui-flow-coverage.json
          flags: ui-flows
          name: ui-flow-coverage
          token: ${{ secrets.CODECOV_TOKEN }}